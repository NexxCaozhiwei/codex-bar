<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Bar product hero</title>
  <desc id="desc">Windows 11 desktop mockup with Codex Bar floating near the taskbar notification area.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f9ff"/>
      <stop offset="0.52" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f7bf6"/>
      <stop offset="1" stop-color="#53d6c6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1080" cy="116" r="190" fill="#dcecff" opacity="0.7"/>
  <circle cx="166" cy="552" r="210" fill="#e8f7f3" opacity="0.75"/>

  <g transform="translate(92 86)">
    <text x="0" y="0" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="56" font-weight="800" fill="#162033">Codex Bar</text>
    <text x="0" y="52" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="25" fill="#536173">Windows 11 任务栏附近的 Codex 状态与额度监控条</text>
    <g transform="translate(0 92)">
      <rect x="0" y="0" width="190" height="42" rx="21" fill="#ffffff"/>
      <circle cx="26" cy="21" r="8" fill="#2fbf71"/>
      <text x="44" y="27" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#314158">空闲 / 已完成</text>
      <rect x="208" y="0" width="170" height="42" rx="21" fill="#ffffff"/>
      <circle cx="234" cy="21" r="8" fill="#2a9df4"/>
      <text x="252" y="27" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#314158">工作 / 审查</text>
      <rect x="396" y="0" width="126" height="42" rx="21" fill="#ffffff"/>
      <circle cx="422" cy="21" r="8" fill="#e15b64"/>
      <text x="440" y="27" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#314158">错误</text>
    </g>
  </g>

  <g transform="translate(188 206)">
    <rect x="0" y="0" width="904" height="398" rx="30" fill="#ffffff"/>
    <rect x="28" y="28" width="848" height="310" rx="24" fill="#f3f7fd" stroke="#dbe7f5"/>
    <rect x="28" y="338" width="848" height="60" fill="#f9fbfe"/>

    <g transform="translate(72 58)">
      <rect x="0" y="0" width="248" height="66" rx="14" fill="#ffffff" stroke="#e4edf8"/>
      <rect x="18" y="18" width="30" height="30" rx="8" fill="#2f7bf6"/>
      <text x="60" y="29" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#708096">当前状态</text>
      <text x="60" y="51" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#162033">Codex 正在工作</text>
    </g>

    <g transform="translate(368 58)">
      <rect x="0" y="0" width="212" height="66" rx="14" fill="#ffffff" stroke="#e4edf8"/>
      <text x="18" y="29" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#708096">5 小时额度</text>
      <text x="18" y="51" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#162033">剩余 68%</text>
    </g>

    <g transform="translate(612 58)">
      <rect x="0" y="0" width="212" height="66" rx="14" fill="#ffffff" stroke="#e4edf8"/>
      <text x="18" y="29" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#708096">7 天额度</text>
      <text x="18" y="51" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#162033">剩余 91%</text>
    </g>

    <g transform="translate(72 166)">
      <rect x="0" y="0" width="752" height="112" rx="22" fill="#ffffff" stroke="#dfe9f6"/>
      <text x="28" y="41" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#536173">贴近任务栏通知区域的小窗</text>
      <text x="28" y="74" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#708096">不注入 Explorer，不修改任务栏；只读取本机 Codex app-server 与 session jsonl。</text>
      <rect x="510" y="34" width="198" height="38" rx="19" fill="url(#bar)"/>
      <text x="544" y="59" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Local-first Monitor</text>
    </g>

    <g transform="translate(510 355)">
      <rect x="0" y="0" width="338" height="34" rx="17" fill="#101820" opacity="0.88"/>
      <text x="22" y="23" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#e8f0ff">任务栏</text>
      <circle cx="228" cy="17" r="6" fill="#2fbf71"/>
      <circle cx="248" cy="17" r="6" fill="#2a9df4"/>
      <circle cx="268" cy="17" r="6" fill="#e15b64"/>
      <text x="286" y="23" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#e8f0ff">21:36</text>
    </g>
  </g>

  <g transform="translate(830 505)">
    <rect x="0" y="0" width="330" height="112" rx="22" fill="#111827" opacity="0.96"/>
    <text x="24" y="34" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Codex</text>
    <circle cx="106" cy="28" r="8" fill="#2fbf71" opacity="0.35"/>
    <circle cx="130" cy="28" r="8" fill="#2a9df4"/>
    <circle cx="154" cy="28" r="8" fill="#e15b64" opacity="0.35"/>
    <text x="182" y="34" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="15" fill="#dbe7ff">正在工作</text>
    <text x="24" y="66" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#b9c5d8">5h</text>
    <rect x="58" y="56" width="170" height="12" rx="6" fill="#2b3548"/>
    <rect x="58" y="56" width="116" height="12" rx="6" fill="#2fbf71"/>
    <text x="248" y="68" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#dbe7ff">68%</text>
    <text x="24" y="92" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#b9c5d8">7d</text>
    <rect x="58" y="82" width="170" height="12" rx="6" fill="#2b3548"/>
    <rect x="58" y="82" width="155" height="12" rx="6" fill="#2a9df4"/>
    <text x="248" y="94" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#dbe7ff">91%</text>
  </g>
</svg>
