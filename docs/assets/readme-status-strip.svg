<svg width="1100" height="360" viewBox="0 0 1100 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Bar compact status strip</title>
  <desc id="desc">Three-line compact Codex Bar UI showing green, blue, and red activity lights with two quota progress bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1726"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27c46a"/>
      <stop offset="1" stop-color="#75e39f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2c91f1"/>
      <stop offset="1" stop-color="#75c9ff"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="360" rx="28" fill="#f6f8fb"/>
  <g transform="translate(70 76)">
    <rect x="0" y="0" width="960" height="208" rx="28" fill="url(#bg)"/>
    <g transform="translate(52 46)">
      <text x="0" y="9" dominant-baseline="middle" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Codex</text>
      <circle cx="140" cy="8" r="10" fill="#32d583" opacity="0.28"/>
      <circle cx="178" cy="8" r="10" fill="#38a2ff"/>
      <circle cx="216" cy="8" r="10" fill="#e15b64" opacity="0.28"/>
      <text x="270" y="10" dominant-baseline="middle" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="21" font-weight="700" fill="#eaf2ff">正在工作</text>
      <text x="706" y="10" dominant-baseline="middle" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#94a3b8">数据源：app-server</text>
    </g>
    <g transform="translate(52 92)">
      <text x="0" y="15" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">5h</text>
      <rect x="74" y="0" width="610" height="30" rx="15" fill="#25324a"/>
      <rect x="74" y="0" width="415" height="30" rx="15" fill="url(#green)"/>
      <text x="718" y="21" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#eaf2ff">剩余 68%</text>
    </g>
    <g transform="translate(52 142)">
      <text x="0" y="15" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700" fill="#cbd5e1">7d</text>
      <rect x="74" y="0" width="610" height="30" rx="15" fill="#25324a"/>
      <rect x="74" y="0" width="555" height="30" rx="15" fill="url(#blue)"/>
      <text x="718" y="21" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#eaf2ff">剩余 91%</text>
    </g>
  </g>
  <g transform="translate(132 308)">
    <text x="0" y="0" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#64748b">绿灯：空闲 / 已完成</text>
    <text x="220" y="0" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#64748b">蓝灯：工作 / 自动审查 / 等待用户</text>
    <text x="574" y="0" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#64748b">红灯：错误</text>
  </g>
</svg>
