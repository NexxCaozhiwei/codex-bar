<svg width="1100" height="430" viewBox="0 0 1100 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Codex Bar local-first privacy model</title>
  <desc id="desc">Local-first privacy illustration showing no cloud telemetry or code upload.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#eef7f4"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2f7bf6"/><stop offset="1" stop-color="#35c2a7"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1d3557" flood-opacity="0.12"/></filter>
  </defs>
  <rect width="1100" height="430" rx="26" fill="url(#bg)"/>
  <g transform="translate(72 64)">
    <text x="0" y="0" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="800" fill="#162033">本地优先的隐私边界</text>
    <text x="0" y="38" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#64748b">Codex Bar 只读取本机 Codex 接口与 session 文件，不上传代码、不上传日志、不收集遥测。</text>
  </g>
  <g transform="translate(84 146)">
    <rect x="0" y="0" width="278" height="180" rx="24" fill="#ffffff" stroke="#dbe7f5"/>
    <rect x="34" y="32" width="70" height="50" rx="10" fill="#e8f1ff"/>
    <rect x="48" y="84" width="42" height="8" rx="4" fill="#9ab6e8"/>
    <text x="34" y="126" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#1e293b">本机电脑</text>
    <text x="34" y="153" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#64748b">Windows 11 用户会话</text>
  </g>
  <g transform="translate(418 146)">
    <rect x="0" y="0" width="278" height="180" rx="24" fill="#ffffff" stroke="#dbe7f5"/>
    <rect x="34" y="32" width="70" height="50" rx="14" fill="#e6fffa"/>
    <path d="M55 63 L65 73 L84 49" fill="none" stroke="#14b8a6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="34" y="126" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#1e293b">本地读取</text>
    <text x="34" y="153" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#64748b">app-server / jsonl / settings</text>
  </g>
  <g transform="translate(752 146)">
    <rect x="0" y="0" width="278" height="180" rx="24" fill="#111827"/>
    <circle cx="70" cy="58" r="30" fill="#273244"/>
    <path d="M50 58 H90" stroke="#f87171" stroke-width="8" stroke-linecap="round"/>
    <text x="34" y="126" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">不做遥测</text>
    <text x="34" y="153" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#cbd5e1">不上传代码或 Codex 日志</text>
  </g>
  <rect x="312" y="226" width="140" height="10" rx="5" fill="url(#accent)" opacity="0.65"/>
  <rect x="646" y="226" width="140" height="10" rx="5" fill="url(#accent)" opacity="0.65"/>
  <text x="80" y="374" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#64748b">建议：README 仍保留“非官方工具”说明，避免用户误解为 OpenAI 官方客户端。</text>
</svg>
